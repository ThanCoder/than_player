name: than_player
description: "audio,video player app.wirtten by flutter."
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 0.1.0
repository: https://github.com/ThanCoder/than_player.git

environment:
  sdk: ^3.12.0
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  audio_service: ^0.18.18
  audio_service_mpris: ^0.2.1
  media_kit: ^1.2.6
  just_audio_media_kit: ^2.1.0
  media_kit_video: ^2.0.1 # For video rendering.
  media_kit_libs_video: ^1.0.7 # Native video dependencies.
  path_provider: ^2.1.6
  dart_core_extensions: ^0.4.0
  t_widgets: ^2.6.1
  mime: ^2.0.0
  than_pkg: ^5.1.0
  flutter_taglib: ^1.3.2
  just_audio: ^0.10.5
  package_info_plus: ^10.2.0
  marquee: ^2.3.0
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  change_app_package_name: ^1.5.0
  # dart run change_app_package_name:main [com.new.package.name]
  # dart run change_app_package_name:main than.app.than_player
  flutter_launcher_icons: ^0.14.4
  # dart run flutter_launcher_icons
# dev lib
flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/images/logos/logo.png"

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/logos/logo.png
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
